<script>
(function () {
  var root = document.documentElement;
  var reduce = root.classList.contains("gb-reduce");

  function ready(fn) {
    if (document.readyState !== "loading") fn();
    else document.addEventListener("DOMContentLoaded", fn);
  }

  function fmt(el, val) {
    var dec = parseInt(el.getAttribute("data-decimals") || "0", 10);
    var p = el.getAttribute("data-prefix") || "";
    var s = el.getAttribute("data-suffix") || "";
    return p + val.toFixed(dec) + s;
  }
  function setFinal(el) {
    el.textContent = fmt(el, parseFloat(el.getAttribute("data-count")));
  }
  function animateCount(el) {
    var target = parseFloat(el.getAttribute("data-count"));
    var dur = 1100, start = null;
    function step(ts) {
      if (!start) start = ts;
      var prog = Math.min((ts - start) / dur, 1);
      var eased = 1 - Math.pow(1 - prog, 3);
      el.textContent = fmt(el, target * eased);
      if (prog < 1) requestAnimationFrame(step);
      else setFinal(el);
    }
    requestAnimationFrame(step);
  }

  ready(function () {
    var reveals = [].slice.call(
      document.querySelectorAll(".reveal, .gb-draw, main.content section.level2")
    );
    var counters = [].slice.call(document.querySelectorAll("[data-count]"));

    // no observer support, or reduced motion: show everything immediately
    if (reduce || !("IntersectionObserver" in window)) {
      reveals.forEach(function (el) { el.classList.add("is-visible"); });
      counters.forEach(setFinal);
    } else {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (!e.isIntersecting) return;
          e.target.classList.add("is-visible");
          if (e.target.hasAttribute("data-count")) animateCount(e.target);
          io.unobserve(e.target);
        });
      }, { threshold: 0.18, rootMargin: "0px 0px -8% 0px" });

      reveals.forEach(function (el) { io.observe(el); });
      counters.forEach(function (el) {
        // counters that are not themselves a reveal still need observing
        if (reveals.indexOf(el) === -1) io.observe(el);
      });
    }

    // scroll progress bar
    var bar = document.querySelector(".gb-progress");
    if (bar && !reduce) {
      var ticking = false;
      function update() {
        var h = document.documentElement;
        var max = h.scrollHeight - h.clientHeight;
        var pct = max > 0 ? (h.scrollTop || document.body.scrollTop) / max * 100 : 0;
        bar.style.width = pct.toFixed(2) + "%";
        ticking = false;
      }
      window.addEventListener("scroll", function () {
        if (!ticking) { requestAnimationFrame(update); ticking = true; }
      }, { passive: true });
      update();
    }
  });
})();
</script>
