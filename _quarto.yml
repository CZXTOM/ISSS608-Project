format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
        <script>document.documentElement.classList.add('js-enabled');if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches){document.documentElement.classList.add('gb-reduce');}</script>
        <script>
        (function () {
          if (window.__gbInit) return;
          window.__gbInit = 1;
          var root = document.documentElement;
          var reduce = root.classList.contains("gb-reduce");
          function ready(fn) {
            if (document.readyState !== "loading") fn();
            else document.addEventListener("DOMContentLoaded", fn);
          }
          function fmt(el, val) {
            var d = parseInt(el.getAttribute("data-decimals") || "0", 10);
            return (el.getAttribute("data-prefix") || "") + val.toFixed(d) + (el.getAttribute("data-suffix") || "");
          }
          function setFinal(el) {
            el.textContent = fmt(el, parseFloat(el.getAttribute("data-count")));
            el.dataset.done = "1";
          }
          function animateCount(el) {
            if (el.dataset.done) return;
            el.dataset.done = "1";
            var target = parseFloat(el.getAttribute("data-count"));
            var dur = 1100, start = null;
            function step(ts) {
              if (!start) start = ts;
              var p = Math.min((ts - start) / dur, 1);
              var e = 1 - Math.pow(1 - p, 3);
              el.textContent = fmt(el, target * e);
              if (p < 1) requestAnimationFrame(step);
              else el.textContent = fmt(el, target);
            }
            requestAnimationFrame(step);
          }
          ready(function () {
            var reveals = [].slice.call(
              document.querySelectorAll(".reveal, .gb-draw, main.content section")
            );
            var counters = [].slice.call(document.querySelectorAll("[data-count]"));
            if (reduce) {
              reveals.forEach(function (el) { el.classList.add("is-visible"); });
              counters.forEach(setFinal);
              return;
            }
            if ("IntersectionObserver" in window) {
              var io = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                  if (e.isIntersecting) { e.target.classList.add("is-visible"); io.unobserve(e.target); }
                });
              }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
              reveals.forEach(function (el) { io.observe(el); });
            } else {
              reveals.forEach(function (el) { el.classList.add("is-visible"); });
            }
            function checkCounters() {
              var vh = window.innerHeight || document.documentElement.clientHeight;
              for (var i = counters.length - 1; i >= 0; i--) {
                var el = counters[i];
                if (el.dataset.done) { counters.splice(i, 1); continue; }
                var r = el.getBoundingClientRect();
                if (r.bottom < 0) { setFinal(el); counters.splice(i, 1); }
                else if (r.top < vh * 0.9 && r.bottom > 0) { animateCount(el); counters.splice(i, 1); }
              }
            }
            var ticking = false;
            function onScroll() {
              if (!ticking) { requestAnimationFrame(function () { checkCounters(); ticking = false; }); ticking = true; }
            }
            window.addEventListener("scroll", onScroll, { passive: true });
            window.addEventListener("resize", onScroll, { passive: true });
            checkCounters();
            setTimeout(checkCounters, 200);
            window.addEventListener("load", checkCounters);
            var bar = document.querySelector(".gb-progress");
            if (bar) {
              var t2 = false;
              function up() {
                var h = document.documentElement;
                var max = h.scrollHeight - h.clientHeight;
                bar.style.width = (max > 0 ? (h.scrollTop / max * 100) : 0).toFixed(2) + "%";
                t2 = false;
              }
              window.addEventListener("scroll", function () {
                if (!t2) { requestAnimationFrame(up); t2 = true; }
              }, { passive: true });
              up();
            }
          });
        })();
        </script>

execute:
  freeze: auto
